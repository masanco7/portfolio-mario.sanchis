# portfolio.masanco-hub.com — Mario Sanchis Colomer
# Public static site (Astro 6 static output). No auth required.
# Serves /opt/portfolio/dist/ with both ES (/) and EN (/en/) routes.

server {
    listen 80;
    server_name portfolio.masanco-hub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portfolio.masanco-hub.com;

    include /etc/nginx/snippets/common-ssl.conf;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /opt/portfolio/dist;
    index index.html;

    # Hashed static assets (Astro emits content-hashed CSS/JS in /_astro/)
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Project images (long cache — change name when updating)
    location ^~ /projects/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CV PDFs — short cache so updates propagate fast
    location ~* ^/cv-.*\.pdf$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Favicon and other static assets
    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # English routes — Astro generates /en/index.html
    location /en/ {
        try_files $uri $uri/ $uri/index.html =404;
    }
    location = /en {
        try_files /en/index.html =404;
    }

    # Default (Spanish, root)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
